---

name: Post-Merge VEN vm-provisioning

on:
  push:
    branches:
      - main
      - release-*
    paths:
      - 'vm-provisioning/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  post-merge-pipeline:
    permissions:
      contents: read
      deployments: write
      security-events: write
      actions: read
    uses: open-edge-platform/orch-ci/.github/workflows/post-merge.yml@7d14e6a6f6b86c1a5dcb4c6c59b8767f821ec690  # 2026.1.3
    with:
      run_version_check: true
      run_dep_version_check: true
      run_build: false
      run_docker_build: false
      run_docker_push: false
      run_helm_build: false
      run_helm_push: false
      run_version_tag: true
      prefix_tag_separator: "/"
      project_folder: "vm-provisioning"
      run_version_dev: true
    secrets:
      SYS_EMF_GH_TOKEN: ${{ secrets.SYS_EMF_GH_TOKEN }}
      NO_AUTH_ECR_PUSH_USERNAME: ${{ secrets.NO_AUTH_ECR_PUSH_USERNAME }}
      NO_AUTH_ECR_PUSH_PASSWD: ${{ secrets.NO_AUTH_ECR_PUSH_PASSWD }}
      MSTEAMS_WEBHOOK: ${{ secrets.TEAMS_WEBHOOK }}
